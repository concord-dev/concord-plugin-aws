name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Keep in lockstep with go.mod.
  GO_VERSION: '1.25.12'

# The plugin SDK is consumed as a published module
# (github.com/concord-dev/concord-plugin-sdk); every job is a clean single-repo
# checkout that fetches it from the proxy — no sibling checkout, no replace
# directive. The workspace-root go.work is for local multi-repo dev only and is
# absent here.

jobs:
  build-test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: go vet
        run: go vet ./...

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::these files need gofmt:"; echo "$unformatted"; exit 1
          fi

      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@v0.7.0
          export PATH="$(go env GOPATH)/bin:$PATH"
          staticcheck ./...

      - name: build
        run: go build ./...

      - name: test (race)
        run: go test -race -count=1 ./...

  vuln:
    name: vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          export PATH="$(go env GOPATH)/bin:$PATH"
          govulncheck ./...
