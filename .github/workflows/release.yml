name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/concord-dev/concord-plugin-aws

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: plugin

      - uses: actions/checkout@v4
        with:
          repository: concord-dev/concord
          path: concord
          ref: main

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: plugin/go.sum

      - name: Build linux/amd64
        working-directory: plugin
        env:
          GOOS: linux
          GOARCH: amd64
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o dist/concord-plugin-aws .

      - uses: oras-project/setup-oras@v1
        with:
          version: 1.2.0

      - uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.0

      - name: Login to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login -u ${{ github.actor }} --password-stdin "${REGISTRY}"

      - name: Push OCI artifact
        id: push
        working-directory: plugin
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          oras push "${IMAGE}:${TAG}" \
            --artifact-type application/vnd.concord.plugin.v1 \
            --annotation "org.concord.dev.artifact.kind=plugin" \
            --annotation "org.concord.dev.plugin.source=aws" \
            --annotation "org.concord.dev.plugin.protocol=v1" \
            --annotation "org.opencontainers.image.title=concord-plugin-aws" \
            --annotation "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --annotation "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --annotation "org.opencontainers.image.version=${TAG}" \
            dist/concord-plugin-aws:application/vnd.concord.plugin.binary.v1
          DIGEST="$(oras resolve "${IMAGE}:${TAG}")"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Cosign sign (keyless)
        run: cosign sign --yes "${IMAGE}@${{ steps.push.outputs.digest }}"

      - name: Verify signature
        run: |
          cosign verify \
            --certificate-identity-regexp "^https://github\.com/${GITHUB_REPOSITORY}/\.github/workflows/.*@refs/tags/.*$" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${IMAGE}@${{ steps.push.outputs.digest }}"
